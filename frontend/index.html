<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font preconnect for fast loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- SEO -->
    <title>Skillora — AI-Powered Placement Intelligence</title>
    <meta name="description" content="Skillora is an AI-powered placement preparation platform. Practice aptitude, DSA, mock tests, and get personalized AI mentorship to ace campus placements." />
    <meta name="keywords" content="placement portal, campus recruitment, aptitude test, DSA practice, AI mentor, coding interview, placement readiness, TCS Infosys Wipro preparation" />
    <meta name="author" content="Skillora" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://skillora.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skillora.com" />
    <meta property="og:title" content="Skillora — AI-Powered Placement Intelligence" />
    <meta property="og:description" content="Ace your campus placement with AI-powered aptitude tests, DSA practice, mock tests, and personalized mentorship." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Skillora — AI-Powered Placement Intelligence" />
    <meta name="twitter:description" content="Ace your campus placement with AI-powered aptitude, DSA, and mock tests." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Skillora" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Skillora",
      "description": "AI-Powered Placement Intelligence and Career Readiness Platform",
      "url": "https://skillora.com",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "INR" },
      "audience": { "@type": "Audience", "audienceType": "Students, Recruiters, Educational Institutions" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
