# ══════════════════════════════════════════════════════════
# SKILLORA — Nginx Production Configuration
# Place at: /etc/nginx/sites-available/skillora
# Enable: ln -s /etc/nginx/sites-available/skillora /etc/nginx/sites-enabled/
# ══════════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Upstream — Spring Boot backend
upstream skillora_backend {
    server localhost:8080;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name skillora.com www.skillora.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name skillora.com www.skillora.com;

    # ── SSL Certificates (from Let's Encrypt) ─────────────
    ssl_certificate     /etc/letsencrypt/live/skillora.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skillora.com/privkey.pem;

    # ── SSL Hardening ─────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security Headers ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Frontend Static Files ─────────────────────────────
    root /opt/skillora/frontend/dist;
    index index.html;

    # Serve static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — all non-API routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── API Proxy → Spring Boot ───────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://skillora_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Don't pass error pages from backend
        proxy_intercept_errors off;
    }

    # Auth endpoints — stricter rate limiting
    location ~ ^/(login|signup|google-login) {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://skillora_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (for load balancer, no rate limit)
    location /actuator/health {
        proxy_pass http://skillora_backend;
        access_log off;
    }

    # Block .env and sensitive files
    location ~ /\. { deny all; return 404; }
    location ~ \.(env|properties|sql|log|sh)$ { deny all; return 404; }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # Logs
    access_log /var/log/nginx/skillora.access.log combined;
    error_log  /var/log/nginx/skillora.error.log warn;
}
