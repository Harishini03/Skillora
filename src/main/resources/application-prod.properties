# ══════════════════════════════════════════════════════
# SKILLORA — Production Profile
# Activate with: --spring.profiles.active=prod
# ══════════════════════════════════════════════════════

spring.application.name=Skillora
server.port=${SERVER_PORT:8080}

# ── MySQL Database ─────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/skillora_db?useSSL=true&requireSSL=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=SkilloraPool
spring.datasource.hikari.leak-detection-threshold=60000

# ── JPA ───────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# ── SQL Init ──────────────────────────────────────────
spring.sql.init.mode=never

# ── H2 Console — MUST be disabled in production ───────
spring.h2.console.enabled=false

# ── JWT ───────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Google OAuth ──────────────────────────────────────
app.google.client-id=${GOOGLE_CLIENT_ID:}

# ── Groq AI ───────────────────────────────────────────
app.groq.api-key=${GROQ_API_KEY}
app.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.groq.api-url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}

# ── Firebase Admin SDK ────────────────────────────────
app.firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
app.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
app.firebase.project-id=${FIREBASE_PROJECT_ID:skillora-94d25}

# ── CORS ──────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ── Error responses — hide internals ──────────────────
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.whitelabel.enabled=false

# ── HTTP Compression ──────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,application/javascript,text/css,image/svg+xml
server.compression.min-response-size=1024

# ── Actuator (health endpoint for load balancers) ─────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.server.port=${MANAGEMENT_PORT:8081}

# ── Logging ───────────────────────────────────────────
logging.level.root=WARN
logging.level.com.placement.placement_intelligence=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.SECURITY_AUDIT=INFO

# ── Performance ───────────────────────────────────────
spring.jmx.enabled=false
spring.main.lazy-initialization=false
spring.threads.virtual.enabled=true
