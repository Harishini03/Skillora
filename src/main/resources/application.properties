spring.application.name=Placement_Intelligence
server.port=8080

# Default runtime uses in-memory H2 for zero-setup local startup.
# Use MySQL with: --spring.profiles.active=mysql
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/placement_intelligence;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# H2 Console (development only - disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:my-super-secret-key-for-placement-intelligence-2026-secure}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.groq.api-url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

# Firebase Admin SDK (optional — only needed if using Firebase Auth)
# Option A: paste the full service account JSON as a single-line string
app.firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
# Option B: path to the service account JSON file
app.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
# Project ID (informational)
app.firebase.project-id=${FIREBASE_PROJECT_ID:}
