# Test Configuration for Placement Intelligence

# Application
spring.application.name=Placement_Intelligence_Test

# In-memory H2 Database for Tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration for Tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# SQL Initialization for Tests
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Disable H2 console in tests
spring.h2.console.enabled=false

# Test JWT Configuration
app.jwt.secret=test-secret-key-for-placement-intelligence-testing-purposes-only
app.jwt.expiration-ms=3600000

# Test Google OAuth Configuration
app.google.client-id=test-google-client-id

# Test Groq AI Configuration
app.groq.api-key=test-groq-api-key
app.groq.model=llama-3.3-70b-versatile
app.groq.api-url=https://api.groq.com/openai/v1/chat/completions

# Test CORS Configuration
app.cors.allowed-origins=http://localhost:5173

# Logging for Tests
logging.level.root=INFO
logging.level.com.placement.placement_intelligence=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
